<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดต่อเรา</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        .container { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
            padding: 40px; 
            max-width: 600px; 
            width: 100%; 
        }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #333; 
            font-weight: 500; 
            font-size: 14px; 
        }
        input, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-family: inherit; 
            font-size: 14px; 
            transition: border-color 0.3s; 
        }
        input:focus, textarea:focus { 
            outline: none; 
            border-color: #667eea; 
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); 
        }
        textarea { resize: vertical; min-height: 120px; }
        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s; 
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        button:active { transform: translateY(0); }
        .loading { display: none; text-align: center; color: #667eea; font-size: 14px; margin-top: 10px; }
        .spinner { 
            display: inline-block; 
            width: 16px; 
            height: 16px; 
            border: 2px solid #f3f3f3; 
            border-top: 2px solid #667eea; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .alert { margin-bottom: 20px; padding: 12px 16px; border-radius: 8px; font-size: 14px; display: none; }
        .alert.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ติดต่อเรา</h1>
        <p class="subtitle">กรอกข้อมูลด้านล่าง เราจะตอบสอบในไม่ช้า</p>
        
        <div id="alert" class="alert"></div>
        
        <form id="contactForm">
            <div class="form-group">
                <label for="name">ชื่อของคุณ *</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="phone">เบอร์โทรศัพท์ *</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
            <div class="form-group">
                <label for="message">ข้อความ *</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit">ส่งข้อมูล</button>
            <div class="loading" id="loading"><span class="spinner"></span> กำลังส่ง...</div>
        </form>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const alert = document.getElementById('alert');
        const loading = document.getElementById('loading');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            loading.style.display = 'block';
            
            try {
                const res = await fetch('send-line.php', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.ok) {
                    showAlert('ส่งข้อมูลเรียบร้อย! ขอบคุณครับ', 'success');
                    form.reset();
                } else {
                    showAlert('เกิดข้อผิดพลาด: ' + (data.msg || 'ไม่ทราบสาเหตุ'), 'error');
                }
            } catch (err) {
                showAlert('เกิดข้อผิดพลาดในการส่ง กรุณาลองใหม่', 'error');
            } finally {
                loading.style.display = 'none';
            }
        });
        
        function showAlert(msg, type) {
            alert.textContent = msg;
            alert.className = 'alert ' + type;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }
    </script>
</body>
</html>
