<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP Exchange - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Prompt',sans-serif; background:#1A1208; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }

  /* LOGIN */
  .login-box {
    background:#2D1F0A; border:1px solid rgba(232,91,27,0.3);
    border-radius:16px; padding:40px; width:100%; max-width:380px; text-align:center;
  }
  .login-logo {
    width:60px; height:60px; background:#E85B1B; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:22px; font-weight:700; color:#fff; margin:0 auto 16px;
  }
  .login-title { color:#fff; font-size:22px; font-weight:600; margin-bottom:6px; }
  .login-sub { color:rgba(255,255,255,0.4); font-size:13px; margin-bottom:28px; }
  .login-input {
    width:100%; background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12); border-radius:8px;
    color:#fff; font-size:16px; font-family:'Prompt',sans-serif;
    padding:12px 16px; outline:none; margin-bottom:16px;
    transition:border-color .2s;
  }
  .login-input:focus { border-color:#E85B1B; }
  .login-btn {
    width:100%; background:#E85B1B; color:#fff; border:none;
    border-radius:8px; padding:13px; font-family:'Prompt',sans-serif;
    font-size:16px; font-weight:600; cursor:pointer; transition:background .2s;
  }
  .login-btn:hover { background:#C44A10; }
  .login-error { color:#f87171; font-size:13px; margin-top:12px; display:none; }

  /* ADMIN PANEL */
  .admin-panel { display:none; width:100%; max-width:800px; }
  .admin-header {
    background:#2D1F0A; border:1px solid rgba(232,91,27,0.3);
    border-radius:12px; padding:20px 28px;
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:24px;
  }
  .admin-header-left { display:flex; align-items:center; gap:12px; }
  .admin-logo {
    width:40px; height:40px; background:#E85B1B; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700; color:#fff;
  }
  .admin-title { color:#fff; font-size:18px; font-weight:600; }
  .admin-sub { color:rgba(255,255,255,0.4); font-size:12px; }
  .logout-btn {
    background:rgba(239,68,68,0.15); color:#f87171;
    border:1px solid rgba(239,68,68,0.3); border-radius:8px;
    padding:8px 18px; font-family:'Prompt',sans-serif; font-size:13px;
    cursor:pointer; transition:background .2s;
  }
  .logout-btn:hover { background:rgba(239,68,68,0.25); }

  .save-bar {
    background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.3);
    border-radius:10px; padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:20px;
  }
  .save-bar span { color:#4ade80; font-size:14px; }
  .save-btn {
    background:#22c55e; color:#fff; border:none;
    border-radius:8px; padding:10px 28px;
    font-family:'Prompt',sans-serif; font-size:15px; font-weight:600;
    cursor:pointer; transition:background .2s;
  }
  .save-btn:hover { background:#16a34a; }

  .rates-card {
    background:#2D1F0A; border:1px solid rgba(232,91,27,0.2);
    border-radius:12px; overflow:hidden; margin-bottom:20px;
  }
  .rates-card-header {
    background:#1A1208; padding:14px 24px;
    display:grid; grid-template-columns:2fr 1fr 1fr;
    gap:16px; border-bottom:1px solid rgba(232,91,27,0.15);
  }
  .rates-card-header span { color:rgba(255,255,255,0.4); font-size:12px; text-transform:uppercase; letter-spacing:.08em; }
  .rate-edit-row {
    display:grid; grid-template-columns:2fr 1fr 1fr;
    gap:16px; padding:14px 24px; align-items:center;
    border-bottom:1px solid rgba(255,255,255,0.05);
    transition:background .15s;
  }
  .rate-edit-row:last-child { border-bottom:none; }
  .rate-edit-row:hover { background:rgba(255,255,255,0.03); }
  .cur-label { display:flex; align-items:center; gap:10px; }
  .cur-flag { font-size:22px; }
  .cur-name-th { color:#fff; font-size:14px; font-weight:500; }
  .cur-code { color:rgba(255,255,255,0.35); font-size:11px; }
  .rate-input {
    width:100%; background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1); border-radius:6px;
    color:#fff; font-size:15px; font-family:'Prompt',sans-serif;
    padding:8px 12px; outline:none; transition:border-color .2s; text-align:center;
  }
  .rate-input:focus { border-color:#E85B1B; }
  .buy-input:focus { border-color:#22c55e; }
  .sell-input:focus { border-color:#f87171; }

  .saved-msg {
    text-align:center; color:#4ade80; font-size:15px;
    padding:12px; display:none;
  }

  .view-web-btn {
    display:block; text-align:center;
    background:rgba(232,91,27,0.15); color:#FF8B4A;
    border:1px solid rgba(232,91,27,0.3); border-radius:10px;
    padding:14px; text-decoration:none; font-size:14px;
    transition:background .2s; margin-top:8px;
  }
  .view-web-btn:hover { background:rgba(232,91,27,0.25); }

  .last-saved { color:rgba(255,255,255,0.3); font-size:12px; text-align:center; margin-top:12px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-box" id="login-box">
  <div class="login-logo">WP</div>
  <div class="login-title">WP Exchange Admin</div>
  <div class="login-sub">กรอก Password เพื่อเข้าสู่ระบบ</div>
  <input type="password" class="login-input" id="pw-input" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
  <button class="login-btn" onclick="doLogin()">🔐 เข้าสู่ระบบ</button>
  <div class="login-error" id="login-error">❌ Password ไม่ถูกต้อง</div>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="admin-panel">
  <div class="admin-header">
    <div class="admin-header-left">
      <div class="admin-logo">WP</div>
      <div>
        <div class="admin-title">ระบบแก้ไขอัตราแลกเปลี่ยน</div>
        <div class="admin-sub">WP Exchange Admin Panel</div>
      </div>
    </div>
    <button class="logout-btn" onclick="doLogout()">ออกจากระบบ</button>
  </div>

  <div class="save-bar">
    <span>💡 แก้ไขอัตราแล้วกด "บันทึก" เพื่ออัปเดตหน้าเว็บ</span>
    <button class="save-btn" onclick="saveRates()">💾 บันทึกอัตราแลกเปลี่ยน</button>
  </div>

  <div class="rates-card">
    <div class="rates-card-header">
      <span>สกุลเงิน</span>
      <span style="text-align:center;">ราคาซื้อ (THB)</span>
      <span style="text-align:center;">ราคาขาย (THB)</span>
    </div>
    <div id="rate-editor"></div>
  </div>

  <div class="saved-msg" id="saved-msg">✅ บันทึกสำเร็จ! อัตราแลกเปลี่ยนอัปเดตแล้ว</div>
  <div class="last-saved" id="last-saved"></div>

  <a href="index.html" class="view-web-btn" target="_blank">🌐 ดูหน้าเว็บหลัก</a>
</div>

<script>
const PASSWORD = 'Diamond59101020';

const currencies = [
  { code:'CNY', flag:'🇨🇳', name:'หยวนจีน', full:'Chinese Yuan' },
  { code:'EUR', flag:'🇪🇺', name:'ยูโร', full:'Euro' },
  { code:'JPY', flag:'🇯🇵', name:'เยนญี่ปุ่น', full:'Japanese Yen (per 100)' },
  { code:'GBP', flag:'🇬🇧', name:'ปอนด์อังกฤษ', full:'British Pound' },
  { code:'SGD', flag:'🇸🇬', name:'ดอลลาร์สิงคโปร์', full:'Singapore Dollar' },
  { code:'HKD', flag:'🇭🇰', name:'ดอลลาร์ฮ่องกง', full:'Hong Kong Dollar' },
  { code:'AUD', flag:'🇦🇺', name:'ดอลลาร์ออสเตรเลีย', full:'Australian Dollar' },
  { code:'KRW', flag:'🇰🇷', name:'วอนเกาหลี (per 100)', full:'Korean Won' },
  { code:'USD', flag:'🇺🇸', name:'ดอลลาร์สหรัฐ', full:'US Dollar' },
];

const defaultRates = {
  CNY: { buy:4.87, sell:4.91 },
  EUR: { buy:36.10, sell:36.60 },
  JPY: { buy:21.50, sell:22.10 },
  GBP: { buy:42.30, sell:43.00 },
  SGD: { buy:25.20, sell:25.60 },
  HKD: { buy:4.25, sell:4.35 },
  AUD: { buy:21.80, sell:22.30 },
  KRW: { buy:2.42, sell:2.50 },
  USD: { buy:33.25, sell:33.55 },
};

function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === PASSWORD) {
    document.getElementById('login-box').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    renderEditor();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('login-box').style.display = 'flex';
  document.getElementById('admin-panel').style.display = 'none';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-error').style.display = 'none';
}

function getSavedRates() {
  try {
    const saved = localStorage.getItem('wp_rates');
    return saved ? JSON.parse(saved) : defaultRates;
  } catch(e) { return defaultRates; }
}

function renderEditor() {
  const rates = getSavedRates();
  const container = document.getElementById('rate-editor');
  container.innerHTML = currencies.map(c => {
    const r = rates[c.code] || defaultRates[c.code];
    return `
      <div class="rate-edit-row">
        <div class="cur-label">
          <span class="cur-flag">${c.flag}</span>
          <div>
            <div class="cur-name-th">${c.name}</div>
            <div class="cur-code">${c.code} · ${c.full}</div>
          </div>
        </div>
        <input type="number" class="rate-input buy-input" id="buy-${c.code}" value="${r.buy}" step="0.01" min="0">
        <input type="number" class="rate-input sell-input" id="sell-${c.code}" value="${r.sell}" step="0.01" min="0">
      </div>
    `;
  }).join('');

  const last = localStorage.getItem('wp_rates_time');
  if (last) document.getElementById('last-saved').textContent = 'บันทึกล่าสุด: ' + last;
}

function saveRates() {
  const newRates = {};
  currencies.forEach(c => {
    newRates[c.code] = {
      buy: parseFloat(document.getElementById('buy-'+c.code).value) || 0,
      sell: parseFloat(document.getElementById('sell-'+c.code).value) || 0,
    };
  });

  localStorage.setItem('wp_rates', JSON.stringify(newRates));
  const now = new Date().toLocaleString('th-TH');
  localStorage.setItem('wp_rates_time', now);

  const msg = document.getElementById('saved-msg');
  msg.style.display = 'block';
  document.getElementById('last-saved').textContent = 'บันทึกล่าสุด: ' + now;
  setTimeout(() => msg.style.display = 'none', 3000);
}
</script>
</body>
</html>
