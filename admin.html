<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แดชบอร์ด - ข้อความที่รับมา</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f5f7fa; 
            padding: 20px; 
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            margin-bottom: 30px; 
        }
        h1 { color: #333; font-size: 24px; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 14px; }
        .dashboard { 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); 
            padding: 20px; 
        }
        .stats { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 15px; 
            margin-bottom: 30px; 
        }
        .stat-box { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 20px; 
            border-radius: 8px; 
            text-align: center; 
        }
        .stat-number { font-size: 28px; font-weight: bold; }
        .stat-label { font-size: 12px; margin-top: 5px; opacity: 0.9; }
        table { width: 100%; border-collapse: collapse; }
        th { 
            background: #f8f9fa; 
            padding: 12px; 
            text-align: left; 
            font-weight: 600; 
            color: #333; 
            font-size: 13px; 
            border-bottom: 2px solid #e9ecef; 
        }
        td { 
            padding: 12px; 
            border-bottom: 1px solid #e9ecef; 
            font-size: 14px; 
        }
        tr:hover { background: #f8f9fa; }
        .time { color: #666; font-size: 13px; }
        .no-data { text-align: center; padding: 40px; color: #999; }
        .loading { text-align: center; padding: 40px; }
        .spinner { 
            display: inline-block; 
            width: 30px; 
            height: 30px; 
            border: 3px solid #f3f3f3; 
            border-top: 3px solid #667eea; 
            border-radius: 50%; 
            animation: spin 0.8s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .refresh-btn { 
            background: #667eea; 
            color: white; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 14px; 
        }
        .refresh-btn:hover { background: #5568d3; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 แดชบอร์ด</h1>
            <p class="subtitle">ข้อความที่ส่งมาจากลูกค้า</p>
        </header>
        
        <div class="dashboard">
            <div style="margin-bottom: 20px; text-align: right;">
                <button class="refresh-btn" onclick="loadMessages()">🔄 รีเฟรช</button>
            </div>
            
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">ข้อความทั้งหมด</div>
                </div>
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
            </div>
            
            <div id="content"></div>
        </div>
    </div>

    <script>
        async function loadMessages() {
            const content = document.getElementById('content');
            const loading = document.getElementById('loading');
            const totalCount = document.getElementById('totalCount');
            
            loading.style.display = 'block';
            content.innerHTML = '';
            
            try {
                const res = await fetch('get-messages.php');
                const data = await res.json();
                
                loading.style.display = 'none';
                
                if (!data.messages || data.messages.length === 0) {
                    content.innerHTML = '<div class="no-data">ยังไม่มีข้อความเข้ามา</div>';
                    totalCount.textContent = '0';
                    return;
                }
                
                totalCount.textContent = data.messages.length;
                
                const messages = data.messages.reverse();
                let html = '<table><thead><tr><th>ชื่อ</th><th>เบอร์</th><th>ข้อความ</th><th>เวลา</th></tr></thead><tbody>';
                
                messages.forEach(msg => {
                    const time = new Date(msg.timestamp).toLocaleString('th-TH');
                    html += `<tr>
                        <td>${escapeHtml(msg.name)}</td>
                        <td>${escapeHtml(msg.phone)}</td>
                        <td>${escapeHtml(msg.message)}</td>
                        <td class="time">${time}</td>
                    </tr>`;
                });
                
                html += '</tbody></table>';
                content.innerHTML = html;
            } catch (err) {
                loading.style.display = 'none';
                content.innerHTML = '<div class="no-data">⚠️ เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadMessages();
        setInterval(loadMessages, 10000);
    </script>
</body>
</html>
